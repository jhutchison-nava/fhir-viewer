name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Allow only the GITHUB_TOKEN permissions needed for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: routes not prerendered are served the app shell so the client router can take over instead of GitHub returning a hard 404.
      - name: Create 404.html
        run: cp dist/client/index.html dist/client/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # TanStack Start emits the static site under dist/client (dist/server is the SSR bundle and is not deployed).
          path: './dist/client'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4